<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A/B Test Dashboard</title>
  <style>
    /* ── Base ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f14;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 6px;
      color: #fff;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 40px;
    }

    /* ── Grid ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto 40px;
    }

    .card {
      background: #1a1a24;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      border: 1px solid #2a2a3a;
    }

    .card .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 10px;
    }

    .card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
    }

    .card .sub {
      font-size: 0.8rem;
      color: #666;
      margin-top: 4px;
    }

    /* ── Variant panels ── */
    .variants {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 900px;
      margin: 0 auto 40px;
    }

      background: #1a1a24;
      border-radius: 12px;
      padding: 28px;
      border: 1px solid #2a2a3a
